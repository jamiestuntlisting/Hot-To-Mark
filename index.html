<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot to Mark — The Stunt Driving Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  display: flex; justify-content: center; align-items: center;
  height: 100vh; overflow: hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas { border: 2px solid #222; border-radius: 6px; cursor: default; }

/* ---- HUD Overlay ---- */
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; display: flex; flex-direction: column; align-items: center;
}
#hud {
  position: absolute; top: 12px; left: 14px;
  color: #fff; font-size: 14px; text-shadow: 1px 1px 3px #000;
  line-height: 1.6;
}

/* ---- Menu ---- */
#mode-select {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(8,8,8,0.94); color: #fff; padding: 44px 64px; border-radius: 18px;
  text-align: center; pointer-events: auto; border: 2px solid #f90;
  box-shadow: 0 0 60px rgba(255,153,0,0.15);
  display: none;
}
#mode-select h1 {
  color: #f90; font-size: 46px; margin-bottom: 2px;
  letter-spacing: 4px; text-shadow: 0 0 20px rgba(255,153,0,0.4);
}
#mode-select .subtitle { color: #bbb; margin-bottom: 28px; font-style: italic; font-size: 15px; }
#mode-select button {
  display: block; width: 100%; margin: 8px 0; padding: 14px 30px; font-size: 17px;
  cursor: pointer; background: #181818; border: 2px solid #f90; border-radius: 8px;
  color: #fff; font-weight: bold; transition: all 0.2s; letter-spacing: 1px;
}
#mode-select button:hover { background: #f90; color: #000; transform: scale(1.02); }
#mode-select .mode-desc { font-size: 11px; color: #888; margin-top: -4px; margin-bottom: 10px; }

/* ---- Results ---- */
#message-box {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(8,8,8,0.92); color: #fff; padding: 34px 54px; border-radius: 14px;
  text-align: center; font-size: 18px; display: none; pointer-events: auto;
  border: 2px solid #f90; box-shadow: 0 0 50px rgba(255,153,0,0.12);
  max-width: 520px;
}
#message-box h2 { color: #f90; margin-bottom: 8px; font-size: 28px; letter-spacing: 2px; }
#message-box .score { font-size: 40px; font-weight: bold; color: #4f4; margin: 6px 0; }
#message-box .penalty { color: #f55; font-size: 13px; }
#message-box .breakdown { text-align: left; margin: 14px 0; font-size: 14px; line-height: 1.9; }
#message-box .stats { font-size: 12px; color: #888; margin-bottom: 12px; }
#message-box button {
  margin: 6px 4px 0; padding: 11px 32px; font-size: 15px; cursor: pointer;
  background: #f90; border: none; border-radius: 6px; color: #000; font-weight: bold;
  transition: all 0.15s;
}
#message-box button:hover { background: #ffb833; transform: scale(1.03); }

/* ---- Controls Help ---- */
#controls-help {
  position: absolute; bottom: 10px; left: 12px; color: #666; font-size: 11px;
  text-shadow: 1px 1px 2px #000; letter-spacing: 0.3px;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-overlay">
  <div id="hud"></div>
  <div id="mode-select"></div>
  <div id="message-box"></div>
  <div id="controls-help"></div>
</div>

<script>
// ================================================================
//  HOT TO MARK — The Stunt Driving Game
//  Built from Scope & Sequence stages 1-8
// ================================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1200, H = 750;
canvas.width = W; canvas.height = H;

// ----------------------------------------------------------------
//  CONSTANTS
// ----------------------------------------------------------------
const PHASE = {
  MENU: 0, DRIVING: 1, STOPPED_ON_MARK: 2,
  HONKING: 3, REVERSING: 4, RESULTS: 5
};

const MAX_FORWARD_MPH = 60;
const MAX_REVERSE_MPH = 25;
const MARK_MIN = 150;
const MARK_MAX = 350;
const MARK_THRESHOLD_PCT = 0.05;
const HONKS_REQUIRED = 2;
const REVERSE_SHIFT_DELAY = 500;
const HURRY_TIME = 15;
const PENALTY_SLOW_TIME = 20;
const PENALTY_FAST_MPH = 15;
const PENALTY_POINTS = 10;
const RETURN_TOLERANCE = 2;
const OVERSHOOT_LIMIT = 20;

const HORIZON_Y = H * 0.38;
const ROAD_TOP_W = 180;
const ROAD_BOT_W = 900;

// ----------------------------------------------------------------
//  AUDIO ENGINE (Web Audio API)
// ----------------------------------------------------------------
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// -- Horn (8.3: realistic car horn, dual-tone) --
function playHorn() {
  try {
    const ac = getAudioCtx();
    const t = ac.currentTime;
    // Dual-tone horn for realism
    [380, 507].forEach(freq => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain); gain.connect(ac.destination);
      osc.frequency.value = freq;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.08, t);
      gain.gain.linearRampToValueAtTime(0.10, t + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
    });
    triggerHaptic('horn');
  } catch (e) {}
}

// -- Tire screech (8.2) --
function playTireScreech(intensity) {
  try {
    const ac = getAudioCtx();
    const bufSize = ac.sampleRate * 0.25;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1200 + intensity * 800; bp.Q.value = 3;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(Math.min(0.08, intensity * 0.04), ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
    src.connect(bp); bp.connect(gain); gain.connect(ac.destination);
    src.start(); src.stop(ac.currentTime + 0.25);
    triggerHaptic('brake');
  } catch (e) {}
}

// -- Engine audio (8.1: RPM-based idle, accel, decel) --
let engineOsc = null, engineGain = null;
let engineOsc2 = null, engineGain2 = null; // second harmonic for richness
let engineNoise = null, engineNoiseGain = null; // exhaust rumble
function initEngineSound() {
  try {
    const ac = getAudioCtx();
    // Primary oscillator (fundamental)
    engineOsc = ac.createOscillator();
    engineGain = ac.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 55;
    engineGain.gain.value = 0;
    engineOsc.connect(engineGain); engineGain.connect(ac.destination);
    engineOsc.start();

    // Second harmonic
    engineOsc2 = ac.createOscillator();
    engineGain2 = ac.createGain();
    engineOsc2.type = 'triangle';
    engineOsc2.frequency.value = 110;
    engineGain2.gain.value = 0;
    engineOsc2.connect(engineGain2); engineGain2.connect(ac.destination);
    engineOsc2.start();

    // Exhaust noise layer
    const bufSize = ac.sampleRate * 2;
    const noiseBuf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const noiseData = noiseBuf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) noiseData[i] = (Math.random() * 2 - 1);
    engineNoise = ac.createBufferSource();
    engineNoise.buffer = noiseBuf;
    engineNoise.loop = true;
    engineNoiseGain = ac.createGain();
    engineNoiseGain.gain.value = 0;
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 200;
    engineNoise.connect(lp); lp.connect(engineNoiseGain); engineNoiseGain.connect(ac.destination);
    engineNoise.start();
  } catch (e) {}
}
function updateEngineSound(speed, throttle) {
  if (!engineOsc) return;
  const absSpeed = Math.abs(speed);
  // RPM simulation: idle at ~55Hz, rev up with speed and throttle
  const idleRPM = 55;
  const speedRPM = absSpeed * 3.2;
  const throttleRPM = throttle * 25;
  const rpm = idleRPM + speedRPM + throttleRPM;

  engineOsc.frequency.value = rpm;
  engineOsc2.frequency.value = rpm * 2.01; // slight detune for richness

  // Volume: idle hum + throttle response + speed contribution
  const idleVol = 0.006;
  const throttleVol = throttle * 0.018;
  const speedVol = absSpeed * 0.0004;
  const vol = Math.min(0.05, idleVol + throttleVol + speedVol);
  engineGain.gain.value = vol;
  engineGain2.gain.value = vol * 0.3;
  if (engineNoiseGain) engineNoiseGain.gain.value = vol * 0.4;

  // Haptic engine vibration
  if (absSpeed > 5 || throttle > 0) triggerHaptic('engine');
}
function stopEngineSound() {
  if (engineGain) engineGain.gain.value = 0;
  if (engineGain2) engineGain2.gain.value = 0;
  if (engineNoiseGain) engineNoiseGain.gain.value = 0;
}

// -- Voice calls (8.5 "Action!", 8.6 "Cut!") via speech synthesis --
function speakVoice(text, pitch, rate) {
  try {
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance(text);
      u.pitch = pitch || 1.0;
      u.rate = rate || 1.1;
      u.volume = 0.7;
      speechSynthesis.speak(u);
    }
  } catch (e) {}
}
function callAction() { speakVoice('Action!', 1.2, 1.0); }
function callCut() { speakVoice('Cut!', 1.1, 0.9); }

// -- Ambient film set audio (8.4: walkie chatter, crew sounds) --
let ambientNode = null, ambientGainNode = null;
function startAmbientAudio() {
  try {
    const ac = getAudioCtx();
    // Create looping crackly walkie-talkie ambient
    const bufSize = ac.sampleRate * 3;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      // Intermittent crackle bursts to simulate walkie chatter
      const burst = Math.sin(i / (ac.sampleRate * 0.4)) > 0.7 ? 1 : 0;
      data[i] = (Math.random() * 2 - 1) * 0.02 * burst;
    }
    ambientNode = ac.createBufferSource();
    ambientNode.buffer = buf;
    ambientNode.loop = true;
    ambientGainNode = ac.createGain();
    ambientGainNode.gain.value = 0.15;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 5;
    ambientNode.connect(bp); bp.connect(ambientGainNode); ambientGainNode.connect(ac.destination);
    ambientNode.start();
  } catch (e) {}
}
function stopAmbientAudio() {
  try {
    if (ambientNode) { ambientNode.stop(); ambientNode = null; }
  } catch (e) {}
}

// -- Haptic feedback (8.7: engine vibration, brake pulse, horn tap) --
function triggerHaptic(type) {
  try {
    if (!navigator.vibrate) return;
    switch (type) {
      case 'horn': navigator.vibrate(80); break;
      case 'brake': navigator.vibrate([30, 10, 30]); break;
      case 'engine': navigator.vibrate(8); break;
      case 'mark': navigator.vibrate([50, 30, 50, 30, 50]); break;
    }
  } catch (e) {}
}

// ----------------------------------------------------------------
//  GAME STATE
// ----------------------------------------------------------------
let state = createFreshState();

function createFreshState() {
  return {
    phase: PHASE.MENU,
    mode: 'standard',
    // Physics
    posX: 0, posY: 0, speed: 0,
    steering: 0, throttle: 0, brake: 0,
    gear: 'D',
    wheelAngle: 0,
    roadOffset: 0,
    // Mark
    markDistance: 250,
    // Scoring
    markAccuracy: 0,
    honkCount: 0,
    honkPenalty: false,
    reverseStartTime: 0,
    reverseTooSlow: false,
    reverseTooFast: false,
    reverseMaxSpeed: 0,
    reverseAccuracy: 0,
    maxSpeedHit: 0,
    takeTime: 0,
    takeStartTime: 0,
    // Smoothness tracking
    lastThrottle: 0, lastSteering: 0,
    jerkAccum: 0,
    smoothnessScore: 100,
    // Exact MPH mode
    targetMPH: 0,
    exactMPHAccuracy: 0,
    checkpointPassed: false,
    checkpointDistance: 0,
    speedAtCheckpoint: 0,
    // Tire screech cooldown
    lastScreechTime: 0,
    // Input
    keys: {},
    // PIP blinking
    recBlink: true, recBlinkTimer: 0,
  };
}

// ----------------------------------------------------------------
//  INPUT
// ----------------------------------------------------------------
document.addEventListener('keydown', e => {
  state.keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.phase === PHASE.STOPPED_ON_MARK || state.phase === PHASE.HONKING) {
      handleHonk();
    }
  }
});
document.addEventListener('keyup', e => { state.keys[e.code] = false; });

function handleHonk() {
  state.honkCount++;
  state.phase = PHASE.HONKING;
  playHorn();
  if (state.honkCount >= HONKS_REQUIRED) {
    setTimeout(() => {
      if (state.phase === PHASE.HONKING) {
        state.gear = 'R';
        state.phase = PHASE.REVERSING;
        state.reverseStartTime = performance.now();
      }
    }, REVERSE_SHIFT_DELAY);
  }
}

// ----------------------------------------------------------------
//  MENU
// ----------------------------------------------------------------
function showMenu() {
  state.phase = PHASE.MENU;
  stopEngineSound();
  const el = document.getElementById('mode-select');
  el.innerHTML = `
    <h1>HOT TO MARK</h1>
    <div class="subtitle">The Stunt Driving Game</div>
    <button onclick="startGame('standard')">Standard Take</button>
    <div class="mode-desc">Drive to the mark, stop accurately, reverse to one.</div>
    <button onclick="startGame('speed')">Speed Run</button>
    <div class="mode-desc">Complete the entire take as fast as possible.</div>
    <button onclick="startGame('smooth')">Smooth Operator</button>
    <div class="mode-desc">Minimize jerky inputs. Be cinematic.</div>
    <button onclick="startGame('exactmph')">Exact MPH</button>
    <div class="mode-desc">Hit exactly the target speed at the checkpoint.</div>
  `;
  el.style.display = 'block';
  document.getElementById('message-box').style.display = 'none';
  document.getElementById('hud').innerHTML = '';
  document.getElementById('controls-help').innerHTML = '';
}

function startGame(mode) {
  document.getElementById('mode-select').style.display = 'none';
  document.getElementById('message-box').style.display = 'none';

  const markDist = MARK_MIN + Math.random() * (MARK_MAX - MARK_MIN);
  const target = 15 + Math.floor(Math.random() * 20);

  state = createFreshState();
  state.phase = PHASE.DRIVING;
  state.mode = mode;
  state.markDistance = markDist;
  state.targetMPH = target;
  state.checkpointDistance = markDist * 0.6;
  state.takeStartTime = performance.now();

  if (!engineOsc) initEngineSound();

  document.getElementById('controls-help').innerHTML =
    'W/&#x2191;: Gas &nbsp;&nbsp; S/&#x2193;: Brake &nbsp;&nbsp; A/D or &#x2190;/&#x2192;: Steer &nbsp;&nbsp; Space: Honk';
}
window.startGame = startGame;
window.showMenu = showMenu;

// ----------------------------------------------------------------
//  PHYSICS (Stage 2 + 4)
// ----------------------------------------------------------------
function updatePhysics(dt) {
  if (state.phase === PHASE.MENU || state.phase === PHASE.RESULTS) return;

  const k = state.keys;

  // Read inputs
  state.throttle = (k['KeyW'] || k['ArrowUp']) ? 1 : 0;
  state.brake = (k['KeyS'] || k['ArrowDown']) ? 1 : 0;

  let steerInput = 0;
  if (k['KeyA'] || k['ArrowLeft']) steerInput = -1;
  if (k['KeyD'] || k['ArrowRight']) steerInput = 1;

  // Smooth steering interpolation
  state.steering += (steerInput * 0.85 - state.steering) * dt * 6;
  state.wheelAngle = state.steering * 45;

  // Smoothness / jerk tracking (for Smooth Operator mode)
  const throttleJerk = Math.abs(state.throttle - state.lastThrottle);
  const steerJerk = Math.abs(state.steering - state.lastSteering);
  state.jerkAccum += (throttleJerk + steerJerk * 0.5) * dt * 60;
  state.lastThrottle = state.throttle;
  state.lastSteering = state.steering;

  // When stopped on mark / honking, just freeze
  if (state.phase === PHASE.STOPPED_ON_MARK || state.phase === PHASE.HONKING) {
    state.speed *= 0.92;
    if (Math.abs(state.speed) < 0.1) state.speed = 0;
    updateEngineSound(0, 0);
    return;
  }

  const isReverse = state.gear === 'R';

  // Forces
  const accelForce = 35;   // mph/s at full throttle
  const brakeForce = 55;   // mph/s at full brake
  const dragCoeff = 0.4;
  const rollingFriction = 1.8;

  if (isReverse) {
    // In reverse, throttle goes negative
    state.speed -= state.throttle * accelForce * dt;
    if (state.speed > 0) state.speed = 0;
    state.speed += state.brake * brakeForce * dt;
    if (state.speed > 0) state.speed = 0;
    // Drag + friction push speed toward 0
    if (state.speed < 0) {
      state.speed += (Math.abs(state.speed) * dragCoeff + rollingFriction) * dt;
      if (state.speed > 0) state.speed = 0;
    }
  } else {
    state.speed += state.throttle * accelForce * dt;
    state.speed -= state.brake * brakeForce * dt;
    if (state.speed > 0) {
      state.speed -= (state.speed * dragCoeff + rollingFriction) * dt;
    }
    if (state.speed < 0) state.speed = 0;
  }

  // Speed limits
  state.speed = Math.max(-MAX_REVERSE_MPH, Math.min(MAX_FORWARD_MPH, state.speed));

  // Tire screech on hard braking
  if (state.brake > 0 && Math.abs(state.speed) > 15) {
    const now = performance.now();
    if (now - state.lastScreechTime > 300) {
      playTireScreech(state.brake * Math.abs(state.speed) / 60);
      state.lastScreechTime = now;
    }
  }

  // Position update
  const feetPerSec = state.speed * 1.467; // mph -> ft/s
  state.posY += feetPerSec * dt;
  state.posX += state.steering * Math.abs(state.speed) * 0.003 * dt * 60;
  state.posX = Math.max(-1, Math.min(1, state.posX));
  state.roadOffset += feetPerSec * dt;

  // Track stats
  if (state.speed > state.maxSpeedHit) state.maxSpeedHit = state.speed;
  if (isReverse && Math.abs(state.speed) > state.reverseMaxSpeed) {
    state.reverseMaxSpeed = Math.abs(state.speed);
  }

  // Exact MPH checkpoint
  if (!isReverse && !state.checkpointPassed && state.posY >= state.checkpointDistance) {
    state.checkpointPassed = true;
    state.speedAtCheckpoint = state.speed;
    state.exactMPHAccuracy = Math.max(0, 100 - Math.abs(state.speed - state.targetMPH) * 5);
  }

  // Mark detection (Stage 3)
  if (state.phase === PHASE.DRIVING) {
    const distFromMark = Math.abs(state.posY - state.markDistance);
    const threshold = state.markDistance * MARK_THRESHOLD_PCT;

    // Stop near mark at low speed
    if (state.posY >= state.markDistance - threshold && Math.abs(state.speed) < 0.5 && state.speed >= 0) {
      state.markAccuracy = Math.max(0, 100 - (distFromMark / threshold) * 100);
      state.speed = 0;
      state.phase = PHASE.STOPPED_ON_MARK;
    }
    // Auto-stop on overshoot
    if (state.posY > state.markDistance + OVERSHOOT_LIMIT && Math.abs(state.speed) < 0.5) {
      state.markAccuracy = Math.max(0, 100 - (distFromMark / threshold) * 100);
      state.speed = 0;
      state.phase = PHASE.STOPPED_ON_MARK;
    }
  }

  // Reverse to one detection (Stage 4)
  if (state.phase === PHASE.REVERSING && state.posY <= RETURN_TOLERANCE && Math.abs(state.speed) < 0.5) {
    state.speed = 0;
    state.reverseAccuracy = Math.max(0, 100 - Math.abs(state.posY) * 10);
    state.takeTime = (performance.now() - state.takeStartTime) / 1000;

    const reverseTime = (performance.now() - state.reverseStartTime) / 1000;
    state.reverseTooSlow = reverseTime > PENALTY_SLOW_TIME;
    state.reverseTooFast = state.reverseMaxSpeed > PENALTY_FAST_MPH;
    state.honkPenalty = state.honkCount < HONKS_REQUIRED;
    state.smoothnessScore = Math.max(0, 100 - state.jerkAccum * 2);

    state.phase = PHASE.RESULTS;
    showResults();
  }

  // Engine audio
  updateEngineSound(state.speed, state.throttle);
}

// ----------------------------------------------------------------
//  RESULTS (Stage 4)
// ----------------------------------------------------------------
function showResults() {
  stopEngineSound();
  const el = document.getElementById('message-box');
  const s = state;

  // Mark accuracy → up to 40 pts
  const markPts = Math.round(s.markAccuracy * 0.4);
  // Return accuracy → up to 20 pts
  const retPts = Math.round(s.reverseAccuracy * 0.2);

  // Mode-specific → up to 40 pts
  let modePts = 0, modeLabel = '';
  switch (s.mode) {
    case 'speed':
      modePts = Math.max(0, Math.round(40 - s.takeTime * 1.5));
      modeLabel = `Speed Bonus (${s.takeTime.toFixed(1)}s): <b>${modePts}/40 pts</b>`;
      break;
    case 'smooth':
      modePts = Math.round(s.smoothnessScore * 0.4);
      modeLabel = `Smoothness: ${s.smoothnessScore.toFixed(0)}% &rarr; <b>${modePts}/40 pts</b>`;
      break;
    case 'exactmph':
      modePts = Math.round((s.exactMPHAccuracy || 0) * 0.4);
      modeLabel = `Exact MPH (target ${s.targetMPH}, hit ${s.speedAtCheckpoint.toFixed(1)}): <b>${modePts}/40 pts</b>`;
      break;
    default: {
      const timePts = Math.max(0, Math.round(20 - s.takeTime * 0.8));
      const smoothPts = Math.round(s.smoothnessScore * 0.2);
      modePts = timePts + smoothPts;
      modeLabel = `Performance (time + smoothness): <b>${modePts}/40 pts</b>`;
    }
  }

  // Penalties
  let penalties = 0, penaltyHTML = '';
  if (s.honkPenalty)    { penalties += PENALTY_POINTS; penaltyHTML += `<div class="penalty">-${PENALTY_POINTS}: Failed to honk twice before reversing</div>`; }
  if (s.reverseTooSlow) { penalties += PENALTY_POINTS; penaltyHTML += `<div class="penalty">-${PENALTY_POINTS}: Took too long to reverse (&gt;${PENALTY_SLOW_TIME}s)</div>`; }
  if (s.reverseTooFast) { penalties += PENALTY_POINTS; penaltyHTML += `<div class="penalty">-${PENALTY_POINTS}: Reversed too fast (${s.reverseMaxSpeed.toFixed(1)} mph &gt; ${PENALTY_FAST_MPH})</div>`; }

  let total = Math.max(0, markPts + retPts + modePts - penalties);

  let grade = 'F';
  if (total >= 95) grade = 'A+';
  else if (total >= 85) grade = 'A';
  else if (total >= 75) grade = 'B+';
  else if (total >= 65) grade = 'B';
  else if (total >= 55) grade = 'C';
  else if (total >= 40) grade = 'D';

  el.innerHTML = `
    <h2>TAKE COMPLETE</h2>
    <div class="score">${total}/100 &mdash; ${grade}</div>
    <div class="breakdown">
      <div>Mark Accuracy: ${s.markAccuracy.toFixed(1)}% &rarr; <b>${markPts}/40 pts</b>
        ${s.markAccuracy <= 0 ? ' <span class="penalty">MISSED!</span>' : ''}</div>
      <div>Return to One: ${s.reverseAccuracy.toFixed(1)}% &rarr; <b>${retPts}/20 pts</b></div>
      <div>${modeLabel}</div>
      ${penaltyHTML}
    </div>
    <div class="stats">
      Top Speed: ${s.maxSpeedHit.toFixed(1)} mph &nbsp;|&nbsp;
      Total Time: ${s.takeTime.toFixed(1)}s &nbsp;|&nbsp;
      Mark: ${s.markDistance.toFixed(0)} ft
    </div>
    <button onclick="startGame('${s.mode}')">Play Again</button>
    <button onclick="showMenu()">Back to Menu</button>
  `;
  el.style.display = 'block';
  document.getElementById('hud').innerHTML = '';
  document.getElementById('controls-help').innerHTML = '';
}

// ---- Sky (Stage 2) ----
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
  grad.addColorStop(0, '#3a78c2');
  grad.addColorStop(0.6, '#6aaddf');
  grad.addColorStop(1, '#a8d8f0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, HORIZON_Y + 2);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  const clouds = [[80,45,90],[310,65,65],[580,35,100],[850,55,70],[1050,40,55]];
  clouds.forEach(([x, y, r]) => {
    ctx.beginPath();
    ctx.ellipse(x, y, r, r * 0.38, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + r * 0.4, y - r * 0.15, r * 0.6, r * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ---- Road & Environment (Stage 2 + 3) ----
function drawRoad() {
  const vanishX = W / 2 + state.posX * -200;

  // Ground
  const gGrad = ctx.createLinearGradient(0, HORIZON_Y, 0, H);
  gGrad.addColorStop(0, '#4a7a3a');
  gGrad.addColorStop(0.08, '#5a8a4a');
  gGrad.addColorStop(1, '#3a6a2a');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, HORIZON_Y, W, H - HORIZON_Y);

  // Road surface
  const botOffset = state.posX * -50;
  ctx.fillStyle = '#3c3c3c';
  ctx.beginPath();
  ctx.moveTo(vanishX - ROAD_TOP_W / 2, HORIZON_Y);
  ctx.lineTo(vanishX + ROAD_TOP_W / 2, HORIZON_Y);
  ctx.lineTo(W / 2 + ROAD_BOT_W / 2 + botOffset, H);
  ctx.lineTo(W / 2 - ROAD_BOT_W / 2 + botOffset, H);
  ctx.closePath();
  ctx.fill();

  // Asphalt texture lines
  ctx.strokeStyle = 'rgba(60,60,60,0.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 6; i++) {
    const t = 0.15 + i * 0.14;
    const y = HORIZON_Y + (H - HORIZON_Y) * t;
    const rw = ROAD_TOP_W + (ROAD_BOT_W - ROAD_TOP_W) * t;
    const cx = vanishX + (W / 2 + botOffset - vanishX) * t;
    ctx.beginPath();
    ctx.moveTo(cx - rw / 2, y);
    ctx.lineTo(cx + rw / 2, y);
    ctx.stroke();
  }

  // Center dashed yellow line
  ctx.strokeStyle = '#eec800';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([16, 22]);
  ctx.lineDashOffset = -(state.roadOffset * 3) % 38;
  ctx.beginPath();
  ctx.moveTo(vanishX, HORIZON_Y);
  ctx.lineTo(W / 2 + botOffset, H);
  ctx.stroke();
  ctx.setLineDash([]);

  // White edge lines
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(vanishX - ROAD_TOP_W / 2, HORIZON_Y);
  ctx.lineTo(W / 2 - ROAD_BOT_W / 2 + botOffset, H);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(vanishX + ROAD_TOP_W / 2, HORIZON_Y);
  ctx.lineTo(W / 2 + ROAD_BOT_W / 2 + botOffset, H);
  ctx.stroke();

  // ---- Marks on road ----
  drawRoadMark();
}

function perspectiveProject(dist, vanishX, botOffset) {
  const t = Math.max(0.005, dist / 300);
  const y = HORIZON_Y + (H - HORIZON_Y) * (1 - t);
  const rw = ROAD_TOP_W + (ROAD_BOT_W - ROAD_TOP_W) * (1 - t);
  const cx = vanishX + (W / 2 + botOffset - vanishX) * (1 - t);
  return { y, rw, cx, t };
}

function drawRoadMark() {
  const vanishX = W / 2 + state.posX * -200;
  const botOffset = state.posX * -50;

  // Red mark (driving forward)
  if (state.phase === PHASE.DRIVING || state.phase === PHASE.STOPPED_ON_MARK || state.phase === PHASE.HONKING) {
    const distToMark = state.markDistance - state.posY;
    if (distToMark > -15 && distToMark < 300) {
      const p = perspectiveProject(distToMark, vanishX, botOffset);
      if (p.t > 0.01) {
        const threshold = state.markDistance * MARK_THRESHOLD_PCT;
        const nearMark = Math.abs(distToMark) < threshold;
        ctx.fillStyle = nearMark ? '#ff2222' : '#ff5555';
        ctx.globalAlpha = Math.min(1, 0.5 / p.t);
        const markH = Math.max(2, 5 / p.t);
        ctx.fillRect(p.cx - p.rw / 2, p.y - markH / 2, p.rw, markH);
        ctx.globalAlpha = 1;

        // MARK label
        if (p.t > 0.04 && p.t < 0.85) {
          const fontSize = Math.round(Math.min(48, 14 / p.t));
          ctx.fillStyle = '#ffe040';
          ctx.font = `bold ${fontSize}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText('MARK', p.cx, p.y - markH / 2 - 4 / p.t);
        }
      }
    }

    // Exact MPH checkpoint line
    if (state.mode === 'exactmph' && state.phase === PHASE.DRIVING) {
      const distToCP = state.checkpointDistance - state.posY;
      if (distToCP > -5 && distToCP < 300) {
        const p = perspectiveProject(distToCP, vanishX, botOffset);
        if (p.t > 0.01) {
          ctx.fillStyle = state.checkpointPassed ? '#44ff44' : '#ffaa00';
          ctx.globalAlpha = Math.min(0.7, 0.3 / p.t);
          ctx.fillRect(p.cx - p.rw / 2, p.y - 1, p.rw, Math.max(2, 3 / p.t));
          ctx.globalAlpha = 1;

          if (p.t > 0.04 && p.t < 0.7) {
            const fs = Math.round(Math.min(32, 10 / p.t));
            ctx.fillStyle = '#ffcc00';
            ctx.font = `bold ${fs}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('CHECKPOINT', p.cx, p.y - 4 / p.t);
          }
        }
      }
    }
  }

  // Green "ONE" mark (reversing)
  if (state.phase === PHASE.REVERSING) {
    const distBehind = state.posY; // how far from start
    if (distBehind > 0 && distBehind < 300) {
      const p = perspectiveProject(distBehind, vanishX, botOffset);
      if (p.t > 0.01) {
        ctx.fillStyle = '#33ff33';
        ctx.globalAlpha = Math.min(1, 0.5 / p.t);
        const markH = Math.max(2, 5 / p.t);
        ctx.fillRect(p.cx - p.rw / 2, p.y - markH / 2, p.rw, markH);
        ctx.globalAlpha = 1;

        if (p.t > 0.04 && p.t < 0.85) {
          const fontSize = Math.round(Math.min(48, 14 / p.t));
          ctx.fillStyle = '#44ff88';
          ctx.font = `bold ${fontSize}px sans-serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText('ONE', p.cx, p.y - markH / 2 - 4 / p.t);
        }
      }
    }
  }
}

// ---- BTS Film Crew (Stage 5) ----
const CREW = [
  { side: -1, dist: 40,  type: 'safety' },
  { side:  1, dist: 50,  type: 'pa' },
  { side: -1, dist: 80,  type: 'grip' },
  { side:  1, dist: 85,  type: 'camera' },
  { side: -1, dist: 150, type: 'director' },
  { side:  1, dist: 165, type: 'grip' },
  { side: -1, dist: 225, type: 'sound' },
  { side:  1, dist: 250, type: 'camera' },
];

const CREW_COLORS = {
  grip: '#555', camera: '#333', director: '#7a3020',
  sound: '#305080', pa: '#508030', safety: '#ee7700'
};

function drawBTSCrew() {
  const vanishX = W / 2 + state.posX * -200;
  const botOffset = state.posX * -50;

  CREW.forEach(crew => {
    const dist = crew.dist - state.posY;
    if (dist < -20 || dist > 300) return;

    const p = perspectiveProject(dist, vanishX, botOffset);
    const scale = (1 / p.t) * 0.15;
    if (scale < 0.4 || scale > 9) return;

    const x = p.cx + crew.side * (p.rw / 2 + 30 / p.t);
    const y = p.y;
    const h = 40 * scale;
    const headR = 5 * scale;

    // Body
    ctx.fillStyle = CREW_COLORS[crew.type] || '#555';
    ctx.fillRect(x - 4 * scale, y - h + headR * 2, 8 * scale, h - headR * 2);

    // Head
    ctx.beginPath();
    ctx.arc(x, y - h, headR, 0, Math.PI * 2);
    ctx.fillStyle = '#ddb89a';
    ctx.fill();

    // Legs
    ctx.strokeStyle = CREW_COLORS[crew.type] || '#555';
    ctx.lineWidth = 2 * scale;
    ctx.beginPath();
    ctx.moveTo(x - 2 * scale, y);
    ctx.lineTo(x - 4 * scale, y + 5 * scale);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 2 * scale, y);
    ctx.lineTo(x + 4 * scale, y + 5 * scale);
    ctx.stroke();

    // Camera on tripod
    if (crew.type === 'camera') {
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(x + 6 * scale, y - h + 10 * scale, 12 * scale, 8 * scale);
      // Lens
      ctx.fillStyle = '#335';
      ctx.beginPath();
      ctx.arc(x + 6 * scale, y - h + 14 * scale, 3 * scale, 0, Math.PI * 2);
      ctx.fill();
      // Tripod legs
      ctx.strokeStyle = '#444';
      ctx.lineWidth = Math.max(1, scale);
      ctx.beginPath();
      ctx.moveTo(x + 12 * scale, y - h + 18 * scale);
      ctx.lineTo(x + 4 * scale, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x + 12 * scale, y - h + 18 * scale);
      ctx.lineTo(x + 20 * scale, y);
      ctx.stroke();
    }

    // Director's chair
    if (crew.type === 'director') {
      ctx.fillStyle = '#6B3310';
      ctx.fillRect(x - 14 * scale, y - 16 * scale, 12 * scale, 16 * scale);
      // Chair back
      ctx.fillStyle = '#2a5020';
      ctx.fillRect(x - 13 * scale, y - 15 * scale, 10 * scale, 6 * scale);
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(6, 5 * scale)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('DIR', x - 8 * scale, y - 10 * scale);
    }

    // Sound boom mic
    if (crew.type === 'sound') {
      ctx.strokeStyle = '#888';
      ctx.lineWidth = Math.max(1, 1.5 * scale);
      ctx.beginPath();
      ctx.moveTo(x, y - h);
      ctx.lineTo(x + crew.side * 20 * scale, y - h - 15 * scale);
      ctx.stroke();
      // Mic fuzzy
      ctx.fillStyle = '#555';
      ctx.beginPath();
      ctx.ellipse(x + crew.side * 20 * scale, y - h - 15 * scale, 4 * scale, 2.5 * scale, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // PA walkie-talkie
    if (crew.type === 'pa') {
      ctx.fillStyle = '#222';
      ctx.fillRect(x + 5 * scale, y - h + 14 * scale, 3 * scale, 8 * scale);
    }

    // Safety vest stripes
    if (crew.type === 'safety') {
      ctx.strokeStyle = '#ffee00';
      ctx.lineWidth = 2 * scale;
      ctx.strokeRect(x - 4 * scale, y - h + headR * 2 + 2 * scale, 8 * scale, 12 * scale);
      // Extra horizontal stripe
      ctx.beginPath();
      ctx.moveTo(x - 4 * scale, y - h + headR * 2 + 8 * scale);
      ctx.lineTo(x + 4 * scale, y - h + headR * 2 + 8 * scale);
      ctx.stroke();
    }
  });
}

// ---- Side Windows & A-Pillars (Stage 1) ----
function drawSideWindows() {
  // Left A-pillar + window
  ctx.fillStyle = '#161616';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.12);
  ctx.lineTo(85, H * 0.06);
  ctx.lineTo(85, H * 0.65);
  ctx.lineTo(0, H * 0.72);
  ctx.closePath();
  ctx.fill();

  // Left glass
  ctx.fillStyle = 'rgba(120,190,230,0.12)';
  ctx.beginPath();
  ctx.moveTo(4, H * 0.14);
  ctx.lineTo(78, H * 0.08);
  ctx.lineTo(78, H * 0.60);
  ctx.lineTo(4, H * 0.66);
  ctx.closePath();
  ctx.fill();

  // Right A-pillar + window
  ctx.fillStyle = '#161616';
  ctx.beginPath();
  ctx.moveTo(W, H * 0.12);
  ctx.lineTo(W - 85, H * 0.06);
  ctx.lineTo(W - 85, H * 0.65);
  ctx.lineTo(W, H * 0.72);
  ctx.closePath();
  ctx.fill();

  // Right glass
  ctx.fillStyle = 'rgba(120,190,230,0.12)';
  ctx.beginPath();
  ctx.moveTo(W - 4, H * 0.14);
  ctx.lineTo(W - 78, H * 0.08);
  ctx.lineTo(W - 78, H * 0.60);
  ctx.lineTo(W - 4, H * 0.66);
  ctx.closePath();
  ctx.fill();

  // A-pillars (structural bars)
  ctx.fillStyle = '#1e1e1e';
  ctx.fillRect(80, H * 0.04, 14, H * 0.62);
  ctx.fillRect(W - 94, H * 0.04, 14, H * 0.62);
}

// ---- Rearview Mirror (Stage 1) ----
function drawRearviewMirror() {
  const mx = W / 2, my = H * 0.075;
  const mw = 150, mh = 52;

  // Housing
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(mx, my, mw / 2 + 6, mh / 2 + 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Mirror surface
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(mx, my, mw / 2, mh / 2, 0, 0, Math.PI * 2);
  ctx.clip();

  const mirGrad = ctx.createLinearGradient(mx - mw / 2, my - mh / 2, mx + mw / 2, my + mh / 2);
  mirGrad.addColorStop(0, '#5a8aaa');
  mirGrad.addColorStop(0.4, '#6a7a88');
  mirGrad.addColorStop(1, '#4a5a68');
  ctx.fillStyle = mirGrad;
  ctx.fillRect(mx - mw / 2, my - mh / 2, mw, mh);

  // Road reflection
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.moveTo(mx - 12, my - 6);
  ctx.lineTo(mx + 12, my - 6);
  ctx.lineTo(mx + 45, my + mh / 2);
  ctx.lineTo(mx - 45, my + mh / 2);
  ctx.closePath();
  ctx.fill();

  // Yellow dashes in mirror
  ctx.strokeStyle = '#cc9';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 5]);
  ctx.beginPath();
  ctx.moveTo(mx, my - 4);
  ctx.lineTo(mx, my + mh / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();

  // Mount
  ctx.fillStyle = '#292929';
  ctx.fillRect(mx - 3, my + mh / 2, 6, 18);
  ctx.strokeStyle = '#292929';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(mx, my + mh / 2 + 18);
  ctx.lineTo(mx, my + mh / 2 + 34);
  ctx.stroke();
}

// ---- Dashboard (Stage 1 + 2) ----
function drawDashboard() {
  const dashY = H * 0.60;

  // Dashboard body
  const dGrad = ctx.createLinearGradient(0, dashY, 0, H);
  dGrad.addColorStop(0, '#2d2d2d');
  dGrad.addColorStop(0.15, '#222');
  dGrad.addColorStop(0.5, '#1a1a1a');
  dGrad.addColorStop(1, '#111');
  ctx.fillStyle = dGrad;
  ctx.beginPath();
  ctx.moveTo(0, dashY + 45);
  ctx.quadraticCurveTo(W / 2, dashY - 25, W, dashY + 45);
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Top trim highlight
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, dashY + 45);
  ctx.quadraticCurveTo(W / 2, dashY - 25, W, dashY + 45);
  ctx.stroke();

  // Leather texture dots
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for (let i = 0; i < 50; i++) {
    const dx = 100 + Math.random() * (W - 200);
    const dy = dashY + 50 + Math.random() * 80;
    ctx.beginPath();
    ctx.arc(dx, dy, 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // Vents
  [W * 0.18, W * 0.82].forEach(vx => {
    ctx.fillStyle = '#0e0e0e';
    const vw = 65, vh = 22;
    ctx.beginPath();
    ctx.roundRect(vx - vw / 2, dashY + 18, vw, vh, 3);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo(vx - vw / 2 + 3, dashY + 20 + i * 3.5);
      ctx.lineTo(vx + vw / 2 - 3, dashY + 20 + i * 3.5);
      ctx.stroke();
    }
  });

  // Instrument cluster
  ctx.fillStyle = '#080808';
  ctx.beginPath();
  ctx.ellipse(W / 2, dashY + 22, 155, 52, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = 2;
  ctx.stroke();

  drawSpeedometer(W / 2, dashY + 22);

  // Gear indicator
  ctx.fillStyle = state.gear === 'R' ? '#ff3333' : '#33dd33';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(state.gear, W / 2 + 88, dashY + 26);

  // Distance
  ctx.fillStyle = '#0ae';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.abs(state.posY).toFixed(1)} ft`, W / 2 - 88, dashY + 28);
}

function drawSpeedometer(cx, cy) {
  const radius = 40;

  // Arc background
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, Math.PI * 0.78, Math.PI * 2.22);
  ctx.stroke();

  // Speed ticks + labels
  for (let mph = 0; mph <= 60; mph += 10) {
    const angle = Math.PI * 0.78 + (mph / 60) * Math.PI * 1.44;
    const inner = radius - 9;
    const outer = radius - 2;
    const active = mph <= Math.abs(state.speed);
    ctx.strokeStyle = active ? '#0f0' : '#2a2a2a';
    ctx.lineWidth = active ? 2.5 : 1.5;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
    ctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
    ctx.stroke();

    ctx.fillStyle = '#666';
    ctx.font = '7px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(mph, cx + Math.cos(angle) * (inner - 9), cy + Math.sin(angle) * (inner - 9));
  }

  // Needle
  const speedAngle = Math.PI * 0.78 + (Math.min(60, Math.abs(state.speed)) / 60) * Math.PI * 1.44;
  ctx.strokeStyle = '#e00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(speedAngle) * (radius - 4), cy + Math.sin(speedAngle) * (radius - 4));
  ctx.stroke();

  // Center dot
  ctx.fillStyle = '#c00';
  ctx.beginPath();
  ctx.arc(cx, cy, 3, 0, Math.PI * 2);
  ctx.fill();

  // Digital readout
  ctx.fillStyle = '#0f0';
  ctx.font = 'bold 15px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(`${Math.abs(state.speed).toFixed(0)} MPH`, cx, cy + 12);
}

// ---- Steering Wheel (Stage 1) ----
function drawSteeringWheel() {
  const cx = W / 2, cy = H - 75;
  const r = 135;
  const angle = state.wheelAngle * Math.PI / 180;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);

  // Outer rim shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 22;
  ctx.beginPath();
  ctx.arc(0, 2, r, 0, Math.PI * 2);
  ctx.stroke();

  // Wheel rim
  ctx.strokeStyle = '#484848';
  ctx.lineWidth = 20;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.stroke();

  // Leather wrap
  ctx.strokeStyle = '#363636';
  ctx.lineWidth = 16;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.stroke();

  // Grip highlights (stitching)
  ctx.strokeStyle = 'rgba(80,80,80,0.3)';
  ctx.lineWidth = 12;
  ctx.beginPath();
  ctx.arc(0, 0, r, Math.PI * 0.6, Math.PI * 0.9);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, r, -Math.PI * 0.1, Math.PI * 0.2);
  ctx.stroke();

  // Spokes
  ctx.strokeStyle = '#5a5a5a';
  ctx.lineWidth = 11;
  // Left
  ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(-32, 0); ctx.stroke();
  // Right
  ctx.beginPath(); ctx.moveTo(r, 0); ctx.lineTo(32, 0); ctx.stroke();
  // Bottom
  ctx.beginPath(); ctx.moveTo(0, r); ctx.lineTo(0, 22); ctx.stroke();

  // Spoke chrome highlights
  ctx.strokeStyle = '#6a6a6a';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-r + 8, -3); ctx.lineTo(-34, -3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(r - 8, -3); ctx.lineTo(34, -3); ctx.stroke();

  // Center hub
  ctx.fillStyle = '#2e2e2e';
  ctx.beginPath();
  ctx.arc(0, 0, 32, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#4a4a4a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Horn pad
  ctx.fillStyle = '#252525';
  ctx.beginPath();
  ctx.arc(0, 0, 20, 0, Math.PI * 2);
  ctx.fill();

  // Horn icon
  ctx.fillStyle = '#5a5a5a';
  ctx.font = 'bold 9px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('HORN', 0, 0);

  ctx.restore();
}

// ---- Hands (Stage 1) ----
function drawHands() {
  const cx = W / 2, cy = H - 75;
  const r = 135;
  const angle = state.wheelAngle * Math.PI / 180;

  const hands = [
    { angleOffset: Math.PI, flip: false },   // 9 o'clock
    { angleOffset: 0, flip: true },           // 3 o'clock
  ];

  hands.forEach(h => {
    const hx = cx + Math.cos(h.angleOffset + angle) * r;
    const hy = cy + Math.sin(h.angleOffset + angle) * r;

    ctx.save();
    ctx.translate(hx, hy);
    ctx.rotate(angle + (h.flip ? 0 : Math.PI));

    // Forearm
    ctx.fillStyle = '#d4a87a';
    ctx.fillRect(-7, -4, 38, 16);

    // Palm
    ctx.beginPath();
    ctx.ellipse(0, 4, 13, 11, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#d4a87a';
    ctx.fill();

    // Fingers
    ctx.fillStyle = '#c49a6e';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.ellipse(i * 5.5, -7, 3.5, 6.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Thumb
    ctx.beginPath();
    ctx.ellipse(9, 9, 4.5, 3.5, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#d4a87a';
    ctx.fill();

    // Knuckle shadows
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.ellipse(i * 5.5, -3, 2.5, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  });
}

// ---- PIP Camera (Stage 6) ----
function drawPIP() {
  if (state.phase === PHASE.MENU || state.phase === PHASE.RESULTS) return;

  const px = W - 224, py = 10, pw = 214, ph = 142;

  // Border
  ctx.fillStyle = '#000';
  ctx.fillRect(px - 4, py - 4, pw + 8, ph + 8);
  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth = 2;
  ctx.strokeRect(px - 4, py - 4, pw + 8, ph + 8);

  ctx.save();
  ctx.beginPath();
  ctx.rect(px, py, pw, ph);
  ctx.clip();

  // Sky in PIP
  const pipSkyGrad = ctx.createLinearGradient(px, py, px, py + ph * 0.36);
  pipSkyGrad.addColorStop(0, '#3a78c2');
  pipSkyGrad.addColorStop(1, '#87ceeb');
  ctx.fillStyle = pipSkyGrad;
  ctx.fillRect(px, py, pw, ph * 0.36);

  // Ground
  ctx.fillStyle = '#5a8a4a';
  ctx.fillRect(px, py + ph * 0.36, pw, ph * 0.64);

  // Road
  const rcx = px + pw * 0.5;
  const roadTop = py + ph * 0.36;
  ctx.fillStyle = '#3c3c3c';
  ctx.beginPath();
  ctx.moveTo(rcx - 16, roadTop);
  ctx.lineTo(rcx + 16, roadTop);
  ctx.lineTo(rcx + 85, py + ph);
  ctx.lineTo(rcx - 85, py + ph);
  ctx.closePath();
  ctx.fill();

  // Center line in PIP
  ctx.strokeStyle = '#cc9';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(rcx, roadTop);
  ctx.lineTo(rcx, py + ph);
  ctx.stroke();
  ctx.setLineDash([]);

  // Mark line in PIP
  const markLine = py + ph * 0.68;
  ctx.fillStyle = '#f44';
  ctx.fillRect(rcx - 65, markLine, 130, 2);

  // Car in PIP
  const carDist = Math.max(0.05, 1 - state.posY / state.markDistance);
  const carScale = Math.min(3.5, 0.25 + (1 - carDist) * 2.5);
  const carCY = roadTop + (py + ph - roadTop) * (1 - carDist * 0.75);
  const carCX = rcx + state.posX * 18 * carScale;
  const cw = 15 * carScale, ch = 9 * carScale;

  // Car body
  ctx.fillStyle = '#1a1a5a';
  ctx.fillRect(carCX - cw / 2, carCY - ch, cw, ch);
  // Roof
  ctx.fillStyle = '#15154a';
  ctx.fillRect(carCX - cw * 0.35, carCY - ch - ch * 0.3, cw * 0.7, ch * 0.3);
  // Windshield
  ctx.fillStyle = 'rgba(140,210,240,0.5)';
  ctx.fillRect(carCX - cw * 0.3, carCY - ch + 1, cw * 0.6, ch * 0.3);
  // Headlights
  ctx.fillStyle = '#ffa';
  ctx.fillRect(carCX - cw / 2, carCY - ch + 1, 2 * carScale, 2 * carScale);
  ctx.fillRect(carCX + cw / 2 - 2 * carScale, carCY - ch + 1, 2 * carScale, 2 * carScale);

  ctx.restore();

  // REC indicator
  state.recBlinkTimer += 1;
  if (state.recBlinkTimer > 30) {
    state.recBlink = !state.recBlink;
    state.recBlinkTimer = 0;
  }
  if (state.recBlink) {
    ctx.fillStyle = '#e00';
    ctx.beginPath();
    ctx.arc(px + 14, py + 14, 5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('REC', px + 23, py + 18);

  // Camera label
  ctx.fillStyle = '#bbb';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('CAM A - WIDE', px + pw - 6, py + 17);

  // Timecode
  const elapsed = (performance.now() - state.takeStartTime) / 1000;
  const mm = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const ss = Math.floor(elapsed % 60).toString().padStart(2, '0');
  const ff = Math.floor((elapsed % 1) * 24).toString().padStart(2, '0');
  ctx.fillStyle = '#ddd';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${mm}:${ss}:${ff}`, px + pw / 2, py + ph - 5);
}

// ---- Windshield Overlay ----
function drawWindshieldTint() {
  // Subtle tint across windshield area
  ctx.fillStyle = 'rgba(180,220,255,0.025)';
  ctx.fillRect(94, 0, W - 188, H * 0.60);

  // Very faint dirt specks
  ctx.fillStyle = 'rgba(200,180,140,0.015)';
  const specks = [[250, 180], [680, 120], [420, 250], [900, 200], [550, 90]];
  specks.forEach(([sx, sy]) => {
    ctx.beginPath();
    ctx.arc(sx, sy, 2, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ---- HUD (overlays via DOM) ----
function updateHUD() {
  if (state.phase === PHASE.MENU || state.phase === PHASE.RESULTS) return;

  const el = document.getElementById('hud');
  const distToMark = state.markDistance - state.posY;
  let html = '';

  // Mode label
  const modeNames = { standard: 'STANDARD TAKE', speed: 'SPEED RUN', smooth: 'SMOOTH OPERATOR', exactmph: 'EXACT MPH' };
  html += `<div style="font-size:16px;color:#f90;font-weight:bold;letter-spacing:1px">${modeNames[state.mode]}</div>`;

  if (state.phase === PHASE.DRIVING) {
    const distColor = distToMark < 20 ? '#f44' : distToMark < 50 ? '#fa0' : '#4f4';
    html += `<div>Distance to Mark: <b style="color:${distColor}">${Math.max(0, distToMark).toFixed(1)} ft</b></div>`;

    if (state.mode === 'exactmph') {
      html += `<div>Target: <b style="color:#ff0">${state.targetMPH} MPH</b> at checkpoint</div>`;
      if (!state.checkpointPassed) {
        const distToCP = state.checkpointDistance - state.posY;
        html += `<div>Checkpoint in: <b>${Math.max(0, distToCP).toFixed(0)} ft</b></div>`;
      } else {
        html += `<div style="color:#4f4">Checkpoint hit: ${state.speedAtCheckpoint.toFixed(1)} MPH (accuracy: ${state.exactMPHAccuracy.toFixed(0)}%)</div>`;
      }
    }
  } else if (state.phase === PHASE.STOPPED_ON_MARK || state.phase === PHASE.HONKING) {
    if (state.markAccuracy > 0) {
      html += `<div style="color:#ff0;font-size:18px;font-weight:bold">ON MARK! ${state.markAccuracy.toFixed(1)}%</div>`;
    } else {
      html += `<div style="color:#f44;font-size:18px;font-weight:bold">MISSED!</div>`;
    }
    html += `<div>Honk horn TWICE (Space) to begin reverse</div>`;
    html += `<div>Honks: <b>${state.honkCount}/${HONKS_REQUIRED}</b></div>`;
  } else if (state.phase === PHASE.REVERSING) {
    html += `<div style="color:#f55;font-size:16px;font-weight:bold">REVERSING TO ONE</div>`;
    html += `<div>Distance to Start: <b>${state.posY.toFixed(1)} ft</b></div>`;
    const elapsed = (performance.now() - state.reverseStartTime) / 1000;
    const hurry = elapsed > HURRY_TIME;
    html += `<div>Time: <b>${elapsed.toFixed(1)}s</b> ${hurry ? '<span style="color:#f44;font-weight:bold">HURRY!</span>' : ''}</div>`;
    html += `<div style="color:#888;font-size:12px">Max reverse speed: ${state.reverseMaxSpeed.toFixed(1)} mph</div>`;
  }

  el.innerHTML = html;
}

// ================================================================
//  MAIN GAME LOOP
// ================================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;

  updatePhysics(dt);

  // Clear
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Render layers (back to front)
  drawSky();
  drawRoad();
  drawBTSCrew();
  drawSideWindows();
  drawRearviewMirror();
  drawWindshieldTint();
  drawDashboard();
  drawSteeringWheel();
  drawHands();
  drawPIP();
  updateHUD();

  requestAnimationFrame(gameLoop);
}

// ---- Boot ----
showMenu();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
